<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emveess Infaventures Pvt. Ltd. - Safety Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* आपकी नई बैकग्राउंड इमेज यहाँ पूरे वाइट सेक्शन में लोड होगी */
            background: url('https://lh3.googleusercontent.com/d/1Lre9EtYPiL4VvCmKJi1AYSKSOnPvPgQh'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.92); /* हल्का ट्रांसपेरेंट कार्ड ताकि पीछे की इमेज का लुक बना रहे */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 35px 30px;
            border-top: 6px solid #0056b3;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #0056b3;
            background: #ffffff;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        .company-name { font-size: 1.4rem; color: #111; font-weight: 700; margin-bottom: 5px; }
        .subtitle { font-size: 0.9rem; color: #444; font-weight: 600; margin-bottom: 25px; }

        .btn-portal {
            display: block;
            background: #0056b3;
            color: #ffffff;
            padding: 16px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-portal:hover { background: #003d7a; transform: translateY(-2px); }

        .footer { margin-top: 30px; font-size: 0.8rem; color: #333; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 15px; }
        .light-text { color: #777; font-size: 0.75rem; margin-top: 10px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="https://lh3.googleusercontent.com/d/1xymrOtXSB_ziOoMZolLJBj9pXKoyTC4I" alt="Logo">
        </div>
        
        <div class="company-name">Emveess Infaventures Pvt. Ltd.</div>
        <div class="subtitle">Daily Management Plan of Safety</div>
        
        <a href="https://script.google.com/macros/s/AKfycbyKpFHGJlliJyzuDfYHn3eDaDyD12mfdviUQa44fpAd9JgyzQ5I2st65Rj-7XLrlqf9/exec" class="btn-portal">
            <i class="fa-solid fa-right-to-bracket"></i> CLICK HERE FOR LOGIN
        </a>
        
        <div class="footer">
            <strong>EMVEESS SAFETY MNGT SYSTEM</strong><br>
            TSL SITE, WEST BOKARO DIVISION
            <div class="light-text">
                Created by: Musahid | &copy; 2026
            </div>
        </div>
    </div>

</body>
</html>
